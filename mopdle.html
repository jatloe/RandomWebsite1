<!DOCTYPE html>
<html>
    <head>
        <link rel="icon" href="jatloesmile-hd.png">
        <title>MOPdle</title>
        <style>
            body {
                width: 99%;
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
            }

            p,select,button {
                font-size: 18pt;
            }
            
            .notshown {
                /* display: none; */
                visibility: hidden;
            }

            .hint-container {
                text-align: center;
                background-color: lightgray;
                border-radius: 1vw;
                width: 50%;
                padding-left: 5vw;
                padding-right: 5vw;
            }

            .guessing {
                display: inline;
            }

            .title-area {
                text-align: center;
            }

            .inline {
                display: inline;
            }

            .smaller {
                font-size: 15pt;
            }
        </style>
    </head>
    <body>
        <div class="title-area">
            <h1>MOPdle</h1>
            <h3 id="daynum">Day ???</h3>
            <div id="results" class="notshown">
                <p class="smaller inline notshown">Copied to clipboard!</p> <!-- To offset the shared on the right :skull: -->
                <p class="inline" id="resultsnumber">?/5 ???</p>
                <button onclick="share()" class="inline">Share</button>
                <p id="sharedtext" class="smaller inline notshown">Copied to clipboard!</p>
            </div>
            <br>
        </div>
        <div class="hint-container">
            <p id="hint1">???</p>
        </div> <br>

        <div class="hint-container">
            <p id="hint2" class="notshown">???</p>
        </div> <br>

        <div class="hint-container">
            <p id="hint3" class="notshown">???</p>
        </div> <br>

        <div class="hint-container">
            <p id="hint4" class="notshown">???</p>
        </div> <br>

        <div class="hint-container">
            <p id="hint5" class="notshown">???</p>
        </div> <br>

        <div class="guessing">
            <select name="guess" id="guess"></select>
            <button type="button" onclick="guess()" id="guessbutton">Guess</button>
        </div>
    </body>
    <script>
        let day = "0";
        let answer = "???";
        let stringtoshare = "";
        let spin = false;

        window.onload = () => {
            let s = prompt("Input daily string (Calvin should have sent this in #mopdle)");
            s = JSON.parse(window.atob(s));
            day = s["day"];
            answer = s["answer"];

            document.getElementById("daynum").innerText = "Day " + day;
            
            for (let i = 1; i <= 5; i++) {
                document.getElementById("hint"+i).innerText = s["hint"+i];
            }

            let name_list = ['Grant Blitz', 'Krittika Chandra', 'Ryan Chen', 'Kailua Cheng', 'Ashen Chutinan', 'Lanie Deng', 'Jonathan Du', 'Evan Fan', 'Yoll Feng', 'David Fox', 'Hannah Fox', 'Rohan Garg', 'Daniel Ge', 'Selena Ge', 'Vihaan Gupta', 'Darren Han', 'Eden He', 'Leo Hong', 'Shihan Kanungo', 'Keshav Karumbunathan', 'Ekam Kaur', 'Hyun-Jin Kim', 'Jason Lee', 'Connor Leong', 'Wendy Leong', 'Xinyi Li', 'Hengrui Liang', 'Andrew Lin', 'Kyle Lin', 'Alexander Liu', 'Jiahe Liu', 'Kevin Long', 'Tony Lu', 'Michael Luo', 'Rohan Mallick', 'Grisham Paimagam', 'Aryan Raj', 'Tarun Rapaka', 'Liam Reddy', 'Ian Rui', 'Drake Tan', 'Lingfei Tang', 'Aaryan Vaishya', 'Ari Wachtel', 'Alexander Wang', 'Calvin Wang', 'Heather Wang', 'Laura Wang', 'Oron Wang', 'Richard Wang', 'Ryan Wang', 'Vincent Wang', 'Kyle Wu', 'Catherine Xu', 'Channing Yang', 'Kevin Yang', 'Royce Yao', 'Feodor Yevtushenko', 'Ali Zaman', 'Tiger Zhang', 'Michael Zhao', 'Vivian Zhong', 'Haofang Zhu', 'Raymond Zhu', 'Eric Zou'];
            if (s.hasOwnProperty("name_list")) {
                if (s["name_list"] == "mathematicians") name_list = ['Georg Cantor', 'Peter Gustav Lejeune Dirichlet', 'Paul Erdos', 'Leonhard Euler', 'Pierre De Fermat', 'Joseph Fourier', 'Evariste Galois', 'Carl Friedrich Gauss', 'Sophie Germain', 'Kurt Godel', 'David Hilbert', 'Joseph-Louis Lagrange', 'Adrien-Marie Legendre', 'John Von Neumann', 'Henri Poincare', 'Srinivasa Ramanujan', 'Bernhard Riemann', 'Terence Tao'];
                if (s["name_list"] == "nojat") name_list = ['Grant Blitz', 'Krittika Chandra', 'Ryan Chen', 'Kailua Cheng', 'Ashen Chutinan', 'Lanie Deng', 'Jonathan Du', 'Evan Fan', 'Yoll Feng', 'David Fox', 'Hannah Fox', 'Rohan Garg', 'Daniel Ge', 'Selena Ge', 'Vihaan Gupta', 'Darren Han', 'Eden He', 'Leo Hong', 'Shihan Kanungo', 'Keshav Karumbunathan', 'Ekam Kaur', 'Hyun-Jin Kim', 'Jason Lee', 'Connor Leong', 'Wendy Leong', 'Xinyi Li', 'Hengrui Liang', 'Andrew Lin', 'Kyle Lin', 'Alexander Liu', 'Jiahe Liu', 'Kevin Long', 'Tony Lu', 'Michael Luo', 'Rohan Mallick', 'Grisham Paimagam', 'Aryan Raj', 'Tarun Rapaka', 'Liam Reddy', 'Ian Rui', 'Drake Tan', 'Lingfei Tang', 'Aaryan Vaishya', 'Ari Wachtel', 'Alexander Wang', 'Heather Wang', 'Laura Wang', 'Oron Wang', 'Richard Wang', 'Ryan Wang', 'Vincent Wang', 'Kyle Wu', 'Catherine Xu', 'Channing Yang', 'Kevin Yang', 'Royce Yao', 'Feodor Yevtushenko', 'Ali Zaman', 'Tiger Zhang', 'Michael Zhao', 'Vivian Zhong', 'Haofang Zhu', 'Raymond Zhu', 'Eric Zou'];
            }

            for (let name of name_list) {
                let node = document.createElement("option");
                let textnode = document.createTextNode(name);
                node.appendChild(textnode);
                node.value = name;
                document.getElementById("guess").appendChild(node);
            }

            if (s.hasOwnProperty("spin") && s["spin"]) {            
                let ind = 0;
                for (let container of document.querySelectorAll(".hint-container")) {
                    let x = ind;
                    setInterval(() => {rotate(container, x)}, 10);
                    ind++;
                }
            }
        }

        function lerp(start,end,r) {
            return start + (end-start) * r;
        }

        class LerpableObject {
            constructor(min, max, start, speed) {
                this.min = min;
                this.max = max;
                this.speed = speed;
                this.current = start;
                this.target = lerp(min, max, Math.random());
            }

            update() {
                this.current = lerp(this.current, this.target, this.speed);
                if (Math.abs(this.current - this.target) / (this.max - this.min) < 0.15) this.target = lerp(this.min, this.max, Math.random());
            }
        }

        let rotation = Array.from({length:5}, (x)=>new LerpableObject(-90,90,0,0.005));
        let offsetx = Array.from({length:5}, (x)=>new LerpableObject(-40,40,0,0.01));
        let offsety = Array.from({length:5}, (x)=>new LerpableObject(-40,40,0,0.01));
        let scale = Array.from({length:5}, (x)=>new LerpableObject(0.6,1.4,1,0.015));

        function rotate(container, ind) {
            container.style.transform = `translate(${offsetx[ind].current}vw, ${offsety[ind].current}vh) scale(${scale[ind].current}) rotate(${rotation[ind].current}deg)`;
            rotation[ind].update();
            offsetx[ind].update();
            offsety[ind].update();
            scale[ind].update();
        }

        let currnum = 1;

        function endGame(won) {
            document.getElementById("results").classList.remove("notshown");
            document.getElementById("resultsnumber").innerText = ["",
                "1/5 OVERMITTING! ",
                "2/5 YAY! ",
                "3/5 OOK! ",
                "4/5 BUH! ",
                "5/5 SKISS! ",
                `X/5 🦧 (It was ${answer}) `,
            ][currnum+1-won];
            document.getElementById("guess").disabled = true;
            document.getElementById("guessbutton").disabled = true;

            for (let i = 1; i <= 5; i++) {
                let el = document.getElementById("hint"+i);
                if (el.classList.contains("notshown")) {
                    el.classList.remove("notshown");
                    el.style.color = "#444444";
                    el.innerText = "(" + el.innerText + ")";
                }
            }
        }

        function guess() {
            let guessed = document.getElementById("guess").value;
            let correct = guessed == answer;

            if (guessed == answer) {
                stringtoshare += "✅\nPlay at: https://jatloe.github.io/RandomWebsite1/mopdle.html";
                stringtoshare = `MOPdle Day ${day} - ${currnum}/5\n` + stringtoshare;
                endGame(true);
            } else if (currnum == 5) {
                stringtoshare += `❌ ||${guessed}||\nPlay at: https://jatloe.github.io/RandomWebsite1/mopdle.html`;
                stringtoshare = `MOPdle Day ${day} - X/5\n` + stringtoshare;
                endGame(false);
            } else {
                stringtoshare += `❌ ||${guessed}||\n`;
                currnum++;
                document.getElementById("hint"+currnum).classList.remove("notshown");
            }
        }

        function share() {
            navigator.clipboard.writeText(stringtoshare.trim());
            document.getElementById("sharedtext").classList.remove("notshown");
        }
    </script>
</html>
